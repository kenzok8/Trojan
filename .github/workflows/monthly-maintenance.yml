name: monthly-maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '55 4 1 * *'

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libboost-system-dev libboost-program-options-dev \
            libssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_MYSQL=OFF

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Audit repository structure
        run: |
          set -euo pipefail
          ! find . -type d \( -name .idea -o -name .vs \) | grep .
          ! find . -type f \( -name '*.o' -o -name '*.obj' -o -name '*.exe' \) | grep .
          test -d docs
          test -d tests
